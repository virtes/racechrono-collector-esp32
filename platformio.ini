[platformio]
default_envs = wemos-d1-mini32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters =
  time
  colorize
  esp32_exception_decoder
upload_speed = 921600
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.0.0
build_flags =
  -DCORE_DEBUG_LEVEL=3

[env:wemos-d1-mini32]
board = wemos_d1_mini32
; upload_port = /dev/cu.wchusbserial210
; monitor_port = /dev/cu.wchusbserial210
